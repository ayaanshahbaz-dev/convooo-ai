{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convoo.ai — Sign Up</title>
    <link rel="icon" type="image/png" href="{% static 'chat/favicon.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--bg:#06060a;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--text:#f4f4f5;--muted:#71717a;--accent:#7c3aed;--accent2:#3b82f6;}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
        .bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;}
        .bg-mesh .blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.35;animation:drift 20s infinite alternate ease-in-out;}
        .blob-1{width:600px;height:600px;background:#7c3aed;top:-15%;left:-10%;animation-delay:0s;}
        .blob-2{width:500px;height:500px;background:#3b82f6;bottom:-10%;right:-10%;animation-delay:-7s;}
        .blob-3{width:400px;height:400px;background:#ec4899;top:50%;left:50%;animation-delay:-14s;}
        @keyframes drift{0%{transform:translate(0,0) scale(1);}25%{transform:translate(60px,-40px) scale(1.1);}50%{transform:translate(-30px,50px) scale(.95);}75%{transform:translate(40px,30px) scale(1.05);}100%{transform:translate(0,0) scale(1);}};
        .bg-mesh::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");opacity:.4;z-index:1;}
        .auth-card{position:relative;z-index:10;width:100%;max-width:380px;margin:20px;padding:44px 36px;background:rgba(12,12,18,0.65);backdrop-filter:blur(40px) saturate(1.5);border:1px solid var(--border);border-radius:28px;box-shadow:0 30px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);animation:cardIn .7s cubic-bezier(.16,1,.3,1) both;}
        @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
        .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px;}
        .logo img{width:36px;height:36px;border-radius:10px;}
        .logo span{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .logo .dot{background:linear-gradient(135deg,var(--accent2),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        h2{text-align:center;font-size:24px;font-weight:600;margin-bottom:6px;}
        .subtitle{text-align:center;color:var(--muted);font-size:14px;margin-bottom:28px;}
        form p{margin-bottom:14px;}
        form label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500;}
        form input[type="text"],form input[type="password"]{width:100%;padding:13px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:15px;font-family:inherit;transition:all .25s;}
        form input:focus{outline:none;border-color:var(--accent);background:rgba(124,58,237,0.06);box-shadow:0 0 0 3px rgba(124,58,237,0.12);}
        form ul{color:#ef4444;font-size:12px;padding-left:18px;margin-top:4px;}
        .helptext{font-size:11px;color:#52525b;display:block;margin-top:4px;}
        .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;margin-top:8px;}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(124,58,237,0.3);}
        .switch{text-align:center;margin-top:24px;color:var(--muted);font-size:14px;}
        .switch a{color:var(--accent);text-decoration:none;font-weight:500;}
        .switch a:hover{text-decoration:underline;}
        @media(max-width:480px){.auth-card{padding:32px 24px;border-radius:24px;margin:16px;}}
    </style>
</head>
<body>
    <div class="bg-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="auth-card">
        <div class="logo">
            <img src="{% static 'chat/favicon.png' %}" alt="Convoo">
            <span>Convoo<span class="dot">.ai</span></span>
        </div>
        <h2>Create your account</h2>
        <p class="subtitle">Start chatting with AI in seconds</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <p class="switch">Already have an account? <a href="/login/">Sign in</a></p>
    </div>
</body>
</html>
